<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account — Politeion</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-shell></div>
  <main class="wrap" style="max-width:640px">
    <div id="view"><p class="muted">Loading…</p></div>
  </main>

  <script type="module">
    import { initShell, escapeHtml } from "./js/app.js";
    initShell("account.html");
    const view = document.getElementById("view");

    function fmtTier(s) { return { free: "Free", basic: "Basic", pro: "Pro" }[s.tier] || s.tier; }

    async function load() {
      let d;
      try { d = await (await fetch("/api/auth/me", { cache: "no-cache" })).json(); }
      catch { view.innerHTML = '<div class="notice notice-warn">Could not reach the server.</div>'; return; }

      if (d.accounts_available === false) {
        view.innerHTML = '<div class="notice notice-warn"><strong>Accounts are temporarily unavailable.</strong> The accounts database is not active on this server yet.</div>';
        return;
      }
      if (!d.user) { location.href = "login.html?next=account.html"; return; }
      const u = d.user;
      const since = (u.created_at || "").slice(0, 10);

      view.innerHTML = `
        <div class="analysis-head">
          <span class="genre-chip ${u.role === "admin" ? "genre-opinion" : ""}">${u.role === "admin" ? "Administrator" : "Member"}</span>
          <h1>${escapeHtml(u.full_name)}</h1>
          <p class="analysis-meta">${escapeHtml(u.email)}</p>
        </div>

        <section class="card">
          <h2 class="section-h" style="margin-top:0">Your details</h2>
          <table class="md-table">
            <tbody>
              <tr><th>Full name</th><td>${escapeHtml(u.full_name)}</td></tr>
              <tr><th>Email</th><td>${escapeHtml(u.email)}</td></tr>
              <tr><th>Birth year</th><td>${u.birth_year != null ? u.birth_year : "—"}</td></tr>
              <tr><th>Member since</th><td>${escapeHtml(since || "—")}</td></tr>
            </tbody>
          </table>
        </section>

        <section class="card">
          <h2 class="section-h" style="margin-top:0">Your saved results</h2>
          <div id="saved-results"><p class="muted">Loading…</p></div>
        </section>

        <section class="card">
          <h2 class="section-h" style="margin-top:0">Subscription &amp; API access</h2>
          <p>Current plan: <strong>${fmtTier(u.subscription)}</strong></p>
          <p class="muted">Paid subscriptions and programmatic API access are coming soon. Your account is ready for them — nothing to do yet.</p>
          <div class="btn-row"><button class="btn" type="button" disabled title="Coming soon">Manage subscription</button></div>
        </section>

        ${u.role === "admin" ? `<section class="card"><h2 class="section-h" style="margin-top:0">Admin</h2>
          <p class="muted">You are signed in as an administrator. Analyzer admin tools (force re-scan, spend/model stats, rate-limit bypass) are unlocked on the <a href="analyze.html">Analyze</a> pages while you're signed in.</p></section>
        <section class="card"><h2 class="section-h" style="margin-top:0">Daily Brief — review &amp; publish</h2>
          <div id="brief-admin"><p class="muted">Loading drafts…</p></div></section>` : ""}

        <div class="btn-row"><button class="btn" type="button" id="logout">Sign out</button></div>`;

      document.getElementById("logout").addEventListener("click", async () => {
        try { await fetch("/api/auth/logout", { method: "POST" }); } catch {}
        location.href = "login.html";
      });

      renderSavedResults();
      if (u.role === "admin") renderBriefAdmin();
    }

    // ---- Daily Brief admin: list drafts, edit items, re-certify, approve --------
    async function renderBriefAdmin() {
      const box = document.getElementById("brief-admin");
      if (!box) return;
      let briefs = [];
      try { briefs = (await (await fetch("/api/brief/admin/list", { cache: "no-cache" })).json()).briefs || []; }
      catch { box.innerHTML = '<p class="muted">Could not load briefs.</p>'; return; }
      if (!briefs.length) { box.innerHTML = '<p class="muted">No briefs drafted yet. Run <code>node tools/brief-draft.js</code> to generate one.</p>'; return; }

      box.innerHTML = briefs.map((b) => {
        const items = [...(b.items || []), ...(b.review || [])];
        const rows = items.map((it, i) => {
          const ok = it.certOk;
          const receipt = it.analysisId ? ` <a href="article.html#id=${encodeURIComponent(it.analysisId)}" target="_blank">receipt</a>` : "";
          return `<div class="brief-admin-item" data-brief="${b.id}" data-idx="${i}">
            <span class="brief-status ${ok ? "ok" : "bad"}">${ok ? "✓ certified" : "✗ needs human edit"}</span>${receipt}
            <input class="ba-headline" value="${escapeHtml(it.headline || "")}" maxlength="90">
            <textarea class="ba-summary" rows="3">${escapeHtml(it.summary || "")}</textarea>
            <textarea class="ba-why" rows="2">${escapeHtml(it.why_it_matters || "")}</textarea>
            <button class="btn ba-save" type="button" style="min-height:34px;padding:.25rem .7rem">Save edit</button>
          </div>`;
        }).join("");
        const canApprove = b.certifiable && b.status !== "published";
        return `<div class="card" style="margin:.6rem 0" data-brief-card="${b.id}">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap">
            <b>${escapeHtml(b.date)} — ${escapeHtml(b.status)}</b>
            <span>
              <button class="btn ba-recert" type="button" data-brief="${b.id}" style="min-height:34px;padding:.25rem .7rem">Re-certify edits</button>
              <button class="btn btn-primary ba-approve" type="button" data-brief="${b.id}" ${canApprove ? "" : "disabled"} style="min-height:34px;padding:.25rem .7rem">Approve &amp; publish</button>
            </span>
          </div>
          ${rows || '<p class="muted">No items.</p>'}
          <p class="muted" style="font-size:.78rem;margin:.4rem 0 0">Editing an item marks it uncertified; re-certify before approval. Approval writes <code>/feed.xml</code>.</p>
        </div>`;
      }).join("");

      box.querySelectorAll(".ba-save").forEach((btn) => btn.addEventListener("click", async () => {
        const row = btn.closest(".brief-admin-item");
        btn.disabled = true;
        try {
          await fetch("/api/brief/admin/edit", { method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ id: row.dataset.brief, index: Number(row.dataset.idx),
              headline: row.querySelector(".ba-headline").value, summary: row.querySelector(".ba-summary").value, why_it_matters: row.querySelector(".ba-why").value }) });
          renderBriefAdmin();
        } catch { btn.disabled = false; }
      }));
      box.querySelectorAll(".ba-recert").forEach((btn) => btn.addEventListener("click", async () => {
        btn.disabled = true; btn.textContent = "Certifying…";
        try { await fetch("/api/brief/admin/recertify", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id: btn.dataset.brief }) }); }
        catch {}
        renderBriefAdmin();
      }));
      box.querySelectorAll(".ba-approve").forEach((btn) => btn.addEventListener("click", async () => {
        if (btn.disabled) return;
        btn.disabled = true;
        try {
          const r = await fetch("/api/brief/admin/approve", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id: btn.dataset.brief }) });
          const d = await r.json();
          if (!r.ok) alert(d.error || "approve failed");
        } catch {}
        renderBriefAdmin();
      }));
    }

    async function renderSavedResults() {
      const box = document.getElementById("saved-results");
      let results = [];
      try { results = (await (await fetch("/api/auth/results", { cache: "no-cache" })).json()).results || []; }
      catch { box.innerHTML = '<p class="muted">Could not load saved results.</p>'; return; }
      if (!results.length) {
        box.innerHTML = '<p class="muted">No saved results yet. Take the <a href="test.html">test</a>, then use “Save to my account” on the results page.</p>';
        return;
      }
      box.innerHTML = '<div class="article-list">' + results.map((r) => {
        const when = (r.created_at || "").slice(0, 10);
        const mode = [r.answer_mode, r.bank_version ? "v" + r.bank_version + " bank" : ""].filter(Boolean).join(" · ");
        return `<div class="article-card" style="justify-content:space-between">
          <a class="article-card-title" href="results.html#r=${encodeURIComponent(r.enc)}" style="flex:1">Result — ${escapeHtml(when)}${mode ? ` <span class="muted">(${escapeHtml(mode)})</span>` : ""}</a>
          <button class="btn" type="button" data-del="${r.id}" style="min-height:32px;padding:.2rem .6rem">Remove</button>
        </div>`;
      }).join("") + "</div>";
      box.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", async () => {
        b.disabled = true;
        try { await fetch("/api/auth/results/" + b.dataset.del, { method: "DELETE" }); renderSavedResults(); } catch { b.disabled = false; }
      }));
    }
    load();
  </script>
</body>
</html>
