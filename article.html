<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analysis — Politeion</title>
  <link rel="canonical" href="https://politeion.com/article.html">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-shell></div>
  <main class="wrap">
    <div id="view"><p class="muted">Loading analysis…</p></div>
    <div class="btn-row" style="justify-content:space-between">
      <button class="btn" type="button" id="back-btn">← Back</button>
      <span style="display:flex;gap:.6rem;align-items:center">
        <button class="btn" type="button" id="rerun-btn" hidden>↻ Re-run scan</button>
        <a class="btn" href="analyze.html">Analyze another article</a>
      </span>
    </div>
    <p id="rerun-status" class="muted" role="status" aria-live="polite" style="text-align:right;font-size:.85rem"></p>
  </main>

  <script type="module">
    import { initShell } from "./js/app.js";
    import { renderArticle, hashParams } from "./js/analyzer-ui.js";
    initShell("analyze.html");

    // Back button: return to the previous page, or the Analyzer if there's no history.
    document.getElementById("back-btn").addEventListener("click", () => {
      if (history.length > 1) history.back(); else location.href = "analyze.html";
    });

    // Returning via Back/Forward can restore the page from the bfcache with the
    // re-run button still disabled from a prior run — re-enable it on restore.
    window.addEventListener("pageshow", () => {
      const b = document.getElementById("rerun-btn");
      if (b && !b.hidden) b.disabled = false;
      document.getElementById("rerun-status").textContent = "";
    });

    const adminKey = () => { try { return localStorage.getItem("dc_analyzer_admin") || ""; } catch { return ""; } };
    let sessionAdmin = false;                 // set from /api/auth/me (admin account)
    const adminActive = () => !!adminKey() || sessionAdmin;
    const view = document.getElementById("view");
    const rerunBtn = document.getElementById("rerun-btn");
    const rerunStatus = document.getElementById("rerun-status");

    // Admin-only: force a fresh scan of this article's URL, then reload it.
    function wireRerun(rec) {
      if (!adminActive() || !rec.url) { rerunBtn.hidden = true; return; }
      rerunBtn.hidden = false;
      rerunBtn.disabled = false;
      rerunBtn.onclick = async () => {
        rerunBtn.disabled = true;
        rerunStatus.textContent = "Re-running fresh scan…";
        try {
          const headers = { "content-type": "application/json" };
          const k = adminKey(); if (k) headers["x-analyzer-admin"] = k; // else cookie session authorizes
          const res = await fetch("/api/analyze", {
            method: "POST",
            headers,
            body: JSON.stringify({ url: rec.url, force: true }),
          });
          const d = await res.json();
          if (!res.ok) { rerunStatus.textContent = d.error || ("Error " + res.status); rerunBtn.disabled = false; return; }
          rerunStatus.textContent = "";
          const target = "id=" + encodeURIComponent(d.id);
          // Re-run replaces in place → same id → hashchange won't fire; refresh
          // explicitly. If the id somehow differs, updating the hash reloads it.
          if (location.hash.replace(/^#/, "") === target) await load();
          else location.hash = target;
        } catch (e) { rerunStatus.textContent = "Network error: " + e.message; rerunBtn.disabled = false; }
      };
    }

    async function load() {
      const id = hashParams().id;
      if (!id) { view.innerHTML = '<div class="notice notice-warn">No analysis id in the link.</div>'; return; }
      try {
        const r = await fetch("/api/analysis/" + encodeURIComponent(id), { cache: "no-cache" });
        if (r.status === 404) { view.innerHTML = '<div class="notice notice-warn">No such analysis.</div>'; return; }
        const d = await r.json();
        renderArticle(view, d.analysis);
        wireRerun(d.analysis);
        document.title = (d.analysis.title || "Analysis") + " — Politeion";
      } catch (e) { view.innerHTML = '<div class="notice notice-warn">Could not load analysis: ' + e.message + '</div>'; }
    }
    window.addEventListener("hashchange", load);
    // Resolve admin session before the first render so the re-run button shows.
    fetch("/api/auth/me", { cache: "no-cache" }).then((r) => r.json())
      .then((d) => { sessionAdmin = !!(d.user && d.user.role === "admin"); })
      .catch(() => {}).finally(load);
  </script>
</body>
</html>
