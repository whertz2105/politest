<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Take the test — Politeion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-shell></div>
  <main class="wrap">
    <div class="test-stage" id="stage">
      <div class="progress"><span id="progress-text">Loading…</span> <span id="mode-badge" class="muted"></span></div>
      <div class="progress-bar"><i id="progress-fill" style="width:0%"></i></div>
      <div class="q-text" id="q-text"></div>
      <div id="answer-area"></div>
      <div class="test-nav">
        <button id="back-btn" type="button">← Back</button>
        <button id="restart-btn" type="button" title="Discard answers and reshuffle">Restart</button>
      </div>
      <p class="muted" id="kbd-hint" style="font-size:0.8rem;margin-top:1rem"></p>
    </div>
  </main>

  <script type="module">
    import { initShell, loadQuestionData, makeSeed, shuffleWithSeed, saveProgress, loadProgress,
             clearProgress, encodeVector, escapeHtml, PROGRESS_KEY, PROGRESS_KEY_LEGACY } from "./js/app.js";
    import { questionsForMode, scoreRun, pendingQuestions, reusableAnswers, itemFingerprints,
             migrateAnswerValue, CLASSIC_ANSWERS, bankSignature } from "./js/scoring.js";

    initShell("test.html");

    let all = [], served = [], byId = new Map(), state = null, currentSig = null, bankVersion = 2;

    // Attention checks are served mixed into the order but are NOT numbered
    // questions: the counter, the denominator and the completion copy all count
    // scored items only, so "250" means 250 real questions plus the checks.
    let numOf = new Map(), numTotal = 0;
    function buildNumbering() {
      numOf = new Map(); numTotal = 0;
      for (const id of state.order) {
        const q = byId.get(id);
        if (q && q.type === "attention") continue;
        numOf.set(id, ++numTotal);
      }
    }

    function testMode() {
      let m; try { m = localStorage.getItem("dc_mode"); } catch {}
      if (m === "quick" || m === "normal" || m === "deep") return m;
      if (m === "full") return "deep";   // legacy alias
      return "normal";                    // default
    }
    function answerMode() { try { return localStorage.getItem("dc_answer_mode") === "precision" ? "precision" : "classic"; } catch { return "classic"; } }

    // Interpolated phrase for the slider readout.
    function phraseFor(v) {
      if (v === 50) return "Neutral";
      const a = (v - 50) / 50, m = Math.abs(a), dir = a > 0 ? "agree" : "disagree";
      let q;
      if (m >= 1) q = "Completely"; else if (m >= 0.8) q = "Strongly";
      else if (m >= 0.5) q = ""; else if (m >= 0.2) q = "Somewhat"; else q = "Slightly";
      return (q ? q + " " : "") + dir.charAt(0).toUpperCase() + dir.slice(1);
    }

    function startFresh(tMode, aMode) {
      served = questionsForMode(all, tMode);
      if (!served.length) { served = all; tMode = "deep"; }
      const seed = makeSeed();
      const order = shuffleWithSeed(served.map((q) => q.id), seed);
      state = { testMode: tMode, answerMode: aMode, seed, order, pos: 0, answers: {}, bankSig: currentSig, bankVersion };
      buildNumbering();
      saveProgress(state);
    }
    function restoreServed() {
      served = questionsForMode(all, state.testMode); if (!served.length) served = all;
      buildNumbering();
    }

    // ---- top-up: extend a finished run with questions added to the bank since ---
    // Only the missing items are asked; the stored answers are merged, not replaced,
    // so a returning taker never redoes the whole test. Nothing is written to the
    // in-progress key, so an unfinished full test is never clobbered by a top-up.
    function loadFinishedRun() {
      let r = null;
      try { r = JSON.parse(localStorage.getItem("dc_last_result") || "null"); } catch { return null; }
      if (!r || !r.answers || !r.vector || !("auth_pw" in r.vector)) return null;   // absent or pre-v2
      return r;
    }
    function startTopUp(run) {
      served = questionsForMode(all, run.testMode || "deep");
      if (!served.length) served = all;
      // Only answers whose item is unchanged carry over; anything reworded or
      // re-keyed since comes back as pending and is asked again.
      const carried = reusableAnswers(run, all);
      const pending = pendingQuestions(carried, served);
      if (!pending.length) return false;
      const seed = makeSeed();
      state = {
        topup: true, base: { ...run, answers: carried }, testMode: run.testMode || "deep",
        answerMode: run.answerMode === "precision" ? "precision" : answerMode(),
        seed, order: shuffleWithSeed(pending.map((q) => q.id), seed),
        pos: 0, answers: {}, bankSig: currentSig, bankVersion,
      };
      buildNumbering();
      return true;
    }
    function renderUpToDate() {
      document.getElementById("stage").innerHTML = `<div class="card">
        <h3 style="margin-top:0">Your result is already up to date</h3>
        <p class="muted">Every question in your test length has an answer — there's nothing to add.</p>
        <div class="btn-row"><a class="btn btn-primary" href="results.html">Back to results</a>
        <a class="btn" href="test.html?fresh=1">Retake the test</a></div></div>`;
    }
    function renderNoRun() {
      document.getElementById("stage").innerHTML = `<div class="card">
        <h3 style="margin-top:0">No earlier test on this device</h3>
        <p class="muted">Topping up needs the answers from a previous run, which are stored in this browser. If you took the test elsewhere, you'll need to take it here.</p>
        <div class="btn-row"><a class="btn btn-primary" href="test.html?fresh=1">Take the test</a>
        <a class="btn" href="index.html">Home</a></div></div>`;
    }

    // Migrate a v1 (dc_progress_v1, -2..+2 answers) session into v2 once.
    function migrateOldProgress() {
      try {
        if (localStorage.getItem(PROGRESS_KEY)) return;
        const old = JSON.parse(localStorage.getItem(PROGRESS_KEY_LEGACY) || "null");
        if (!old || !Array.isArray(old.order)) return;
        const answers = {};
        for (const [id, v] of Object.entries(old.answers || {})) answers[id] = migrateAnswerValue(Number(v));
        saveProgress({ testMode: old.mode || "full", answerMode: answerMode(), seed: old.seed, order: old.order, pos: old.pos || 0, answers });
        localStorage.removeItem(PROGRESS_KEY_LEGACY);
      } catch {}
    }

    async function boot() {
      let data;
      try { data = await loadQuestionData(); }
      catch (e) {
        document.getElementById("stage").innerHTML = `<div class="card validation-errors"><h3>Could not load questions</h3><p>${e.message}</p><p class="muted">See the <a href="data.html">Data page</a>.</p></div>`;
        return;
      }
      all = data.questions;
      bankVersion = data.bankVersion || 2;
      byId = new Map(all.map((q) => [q.id, q]));
      currentSig = bankSignature(all);
      if (!all.length) {
        document.getElementById("stage").innerHTML = `<div class="card validation-errors"><h3>No valid questions</h3><p>See the <a href="data.html">Data page</a>.</p></div>`;
        return;
      }
      migrateOldProgress();
      const params = new URLSearchParams(location.search);
      const stored = loadProgress();
      const validStored = stored && Array.isArray(stored.order) && stored.order.length && stored.order.every((id) => byId.has(id));

      // A finished run only needs the questions added since — never the whole test.
      if (params.has("topup")) {
        const run = loadFinishedRun();
        if (!run) return renderNoRun();
        if (!startTopUp(run)) return renderUpToDate();
        render();
        return;
      }
      if (params.has("fresh")) { startFresh(testMode(), answerMode()); render(); return; }
      // REFUSE to resume a session whose bank differs from the loaded one — ids can
      // collide across bank versions while the underlying question changed, which
      // would score answers against the wrong questions. Never merge positionally.
      if (validStored && stored.bankSig !== currentSig) { renderBankChanged(); return; }
      // Resume into the test ONLY if the started session already has ≥1 answer.
      // A fresh, answerless session must not throw the user straight into questions.
      const hasAnswers = validStored && stored.answers && Object.keys(stored.answers).length >= 1;
      if (hasAnswers) {
        state = stored;
        // Answer STYLE follows the current landing pick even on resume — answers are
        // a unified 0..100 value, so switching classic<->precision mid-test is safe.
        // (Test LENGTH stays fixed for the session; it changes the served set.)
        state.answerMode = answerMode();
        saveProgress(state);
        restoreServed();
        render();
        return;
      }
      // Default: show the test options (configure before starting), not the test.
      renderOptions();
    }

    // Read-only review of the most recent completed test's answers.
    function renderReview(run) {
      const answers = run.answers || {};
      const numbered = all.filter((q) => q.type !== "attention").sort((a, b) => a.id - b.id);
      const rows = [];
      for (const q of numbered) {
        const v = answers[q.id];
        if (v === undefined || v === null) continue;
        const nv = Number(v);
        rows.push(`<div class="review-row"><span class="review-q">${escapeHtml(q.text)}</span>
          <span class="review-a ${nv >= 50 ? "pos" : "neg"}">${escapeHtml(phraseFor(nv))} <span class="muted">(${nv})</span></span></div>`);
      }
      const mode = run.answerMode === "precision" ? "precision" : "classic";
      document.getElementById("stage").innerHTML = `
        <div class="review-head">
          <h2 style="margin:0">Your most recent test</h2>
          <a class="btn btn-primary" href="test.html?fresh=1">Start a new test</a>
        </div>
        <p class="muted">Your answers to ${rows.length} question${rows.length === 1 ? "" : "s"} (${mode} mode). <a href="results.html">See your compass →</a></p>
        <div class="review-list">${rows.join("") || '<p class="muted">No stored answers.</p>'}</div>`;
    }

    // Default landing: choose answer style + length, then start. (Shown unless a
    // started test already has answers, in which case boot() resumes it.)
    function renderOptions() {
      const finished = loadFinishedRun();
      const stage = document.getElementById("stage");
      stage.innerHTML = `
        <div style="text-align:center">
          <h2 style="margin-top:0">Take the compass test</h2>
          <p class="muted">Choose how you'll answer and how long, then begin — you'll be placed on 22 independent political axes.</p>
          <div class="picker-label">Answer style</div>
          <div class="mode-picker" role="radiogroup" aria-label="Answer style">
            <button class="mode-opt" type="button" data-mode="classic"><b>Classic</b><span class="muted">Five buttons — faster</span></button>
            <button class="mode-opt" type="button" data-mode="precision"><b>Precision</b><span class="muted">Slider — exact placement</span></button>
          </div>
          <div class="picker-label">Length</div>
          <div class="mode-picker" role="radiogroup" aria-label="Test length">
            <button class="mode-opt" type="button" data-len="quick"><b>Quick</b><span class="muted">100 questions</span></button>
            <button class="mode-opt" type="button" data-len="normal"><b>Normal</b><span class="muted">250 questions</span></button>
            <button class="mode-opt" type="button" data-len="deep"><b>Deep</b><span class="muted">Full 400-item bank</span></button>
          </div>
          <div class="btn-row" style="justify-content:center;margin-top:1.2rem">
            <button class="btn btn-primary" id="opt-start" type="button">Start the test</button>
            ${finished ? '<a class="btn" href="results.html">See your last result →</a><button class="btn" id="opt-review" type="button">Review your answers</button>' : ""}
          </div>
        </div>`;
      const styleBtns = [...stage.querySelectorAll("[data-mode]")];
      const applyStyle = () => styleBtns.forEach((b) => b.classList.toggle("active", b.dataset.mode === answerMode()));
      styleBtns.forEach((b) => b.addEventListener("click", () => { try { localStorage.setItem("dc_answer_mode", b.dataset.mode); } catch { /* ignore */ } applyStyle(); }));
      applyStyle();
      const lenBtns = [...stage.querySelectorAll("[data-len]")];
      const applyLen = () => lenBtns.forEach((b) => b.classList.toggle("active", b.dataset.len === testMode()));
      lenBtns.forEach((b) => b.addEventListener("click", () => { try { localStorage.setItem("dc_mode", b.dataset.len); } catch { /* ignore */ } applyLen(); }));
      applyLen();
      stage.querySelector("#opt-start").addEventListener("click", () => { startFresh(testMode(), answerMode()); render(); });
      const rev = stage.querySelector("#opt-review");
      if (rev) rev.addEventListener("click", () => renderReview(finished));
    }

    function renderBankChanged() {
      document.getElementById("stage").innerHTML = `<div class="card banner-warn">
        <h3 style="margin-top:0">The question set has changed</h3>
        <p>The question bank has been updated since you started this test, so your in-progress answers can no longer be reliably matched to the right questions. To avoid mis-scoring, please restart — your previous answers can't be safely carried over.</p>
        <div class="btn-row"><a class="btn btn-primary" href="test.html?fresh=1">Restart test</a><a class="btn" href="index.html">Home</a></div></div>`;
    }

    const LEN_LABEL = { quick: "quick · 100", normal: "normal · 250", deep: "deep" };
    function render() {
      const total = state.order.length;
      if (state.pos >= total) return renderCompletion();
      const id = state.order[state.pos];
      const q = byId.get(id);
      // An attention check gets no number — the counter names it instead, so the
      // count never appears to stall on an item that isn't one of the questions.
      document.getElementById("progress-text").textContent =
        q.type === "attention" ? "Attention check" : `${numOf.get(id)} / ${numTotal}`;
      document.getElementById("mode-badge").textContent = state.topup
        ? `· ${state.answerMode === "precision" ? "precision" : "classic"} · new questions only`
        : `· ${state.answerMode === "precision" ? "precision" : "classic"} · ${LEN_LABEL[state.testMode] || state.testMode}`;
      document.getElementById("progress-fill").style.width = `${(state.pos / total) * 100}%`;
      document.getElementById("q-text").textContent = q.text;
      document.getElementById("back-btn").disabled = state.pos === 0;
      document.getElementById("restart-btn").hidden = !!state.topup;
      if (state.answerMode === "precision") renderSlider(id); else renderClassic(id);
    }

    // ---- Classic 5-button ----
    function renderClassic(id) {
      document.getElementById("kbd-hint").textContent = "Keyboard: 1 Strongly Agree · 2 Agree · 3 Neutral · 4 Disagree · 5 Strongly Disagree · ← Back";
      const cur = state.answers[id];
      const area = document.getElementById("answer-area");
      area.className = "answers";
      area.innerHTML = CLASSIC_ANSWERS.map((o) =>
        `<button type="button" data-v="${o.v}" class="${cur === o.v ? "sel" : ""}"><span>${o.label}</span><span class="k">${o.key}</span></button>`).join("");
      area.querySelectorAll("button").forEach((b) => b.addEventListener("click", () => record(Number(b.dataset.v))));
    }

    // ---- Precision slider ----
    let engaged = false;
    function renderSlider(id) {
      document.getElementById("kbd-hint").textContent = "Slider: ←/→ ±1 · PgUp/PgDn ±10 · Home/End 0/100 · type a number · Enter = Next";
      const recorded = state.answers[id];
      const val = recorded !== undefined ? recorded : 50;
      engaged = recorded !== undefined;
      const area = document.getElementById("answer-area");
      area.className = "";
      area.innerHTML = `
        <div class="slider-wrap">
          <div class="slider-readout" id="sl-readout"><b id="sl-val">${val}</b> <span id="sl-phrase">${phraseFor(val)}</span></div>
          <input type="range" id="slider" class="slider" min="0" max="100" step="1" value="${val}"
                 aria-label="Agreement 0 to 100" aria-valuetext="${val}, ${phraseFor(val)}">
          <div class="slider-ends"><span>Completely disagree</span><span>Completely agree</span></div>
          <div class="slider-ticks">
            <span style="left:0%">Strongly disagree</span><span style="left:25%">Disagree</span>
            <span style="left:50%">Neutral</span><span style="left:75%">Agree</span><span style="left:100%">Strongly agree</span>
          </div>
          <div class="slider-controls">
            <input type="number" id="sl-num" min="0" max="100" step="1" value="${val}" aria-label="Typed value">
            <button id="neutral-btn" type="button">Neutral / No opinion</button>
            <button id="next-btn" type="button" class="btn-primary" ${engaged ? "" : "disabled"}>Next →</button>
          </div>
        </div>`;

      const slider = area.querySelector("#slider");
      const num = area.querySelector("#sl-num");
      const setUI = (v) => {
        v = Math.max(0, Math.min(100, Math.round(v)));
        slider.value = v; num.value = v;
        area.querySelector("#sl-val").textContent = v;
        area.querySelector("#sl-phrase").textContent = phraseFor(v);
        slider.setAttribute("aria-valuetext", `${v}, ${phraseFor(v)}`);
        area.querySelector("#sl-readout").style.left = v + "%";
        return v;
      };
      const engage = (v) => { engaged = true; area.querySelector("#next-btn").disabled = false; setUI(v); };
      setUI(val); // position readout (does not engage)

      slider.addEventListener("input", () => engage(Number(slider.value)));
      num.addEventListener("input", () => { if (num.value !== "") engage(Number(num.value)); });
      area.querySelector("#neutral-btn").addEventListener("click", () => record(50)); // explicit engagement -> record
      area.querySelector("#next-btn").addEventListener("click", () => { if (engaged) record(Number(slider.value)); });
    }

    function renderCompletion() {
      document.getElementById("progress-text").textContent = `${numTotal} / ${numTotal}`;
      document.getElementById("mode-badge").textContent = "· complete";
      document.getElementById("progress-fill").style.width = "100%";
      document.getElementById("q-text").textContent = "All questions answered.";
      const area = document.getElementById("answer-area");
      area.className = "";
      area.innerHTML = state.topup
        ? `<div class="card" style="text-align:center">
            <p>That's ${numTotal} new question${numTotal === 1 ? "" : "s"} answered. They'll be added to your earlier test — the rest of your answers are kept as they were.</p>
            <button id="finish-btn" class="btn btn-primary" style="min-width:240px">Add to my result →</button></div>`
        : `<div class="card" style="text-align:center">
            <p>You answered all ${numTotal} questions (${state.answerMode === "precision" ? "precision" : "classic"} mode). Ready to see your compass?</p>
            <button id="finish-btn" class="btn btn-primary" style="min-width:240px">Finish and see results →</button></div>`;
      area.querySelector("#finish-btn").addEventListener("click", finish);
      document.getElementById("back-btn").disabled = false;   // go back to revise the last answer
      document.getElementById("kbd-hint").textContent = "Press Enter (or the button) to see your results · ← Back to revise.";
    }

    // A top-up is an in-memory mini-session: persisting it would overwrite an
    // unfinished full test under the same key.
    function persist() { if (!state.topup) saveProgress(state); }

    function record(v) {
      const id = state.order[state.pos];
      state.answers[id] = v;
      state.pos += 1;
      persist();
      render();
    }
    function back() { if (state.pos === 0) return; state.pos -= 1; persist(); render(); }

    function finish() {
      // A top-up merges onto the earlier run's answers; a normal run starts clean.
      const answers = {};
      if (state.topup) for (const [k, v] of Object.entries(state.base.answers || {})) answers[Number(k)] = v;
      for (const [k, v] of Object.entries(state.answers)) answers[Number(k)] = v;
      const scored = scoreRun(answers, served, { seed: state.seed >>> 0, iters: 200 });
      const enc = encodeVector(scored.vector);
      const data = window.__dc_data || {};
      // The earlier run's attention verdict stands: it measured that sitting, and a
      // handful of top-up items can't re-measure it (pendingQuestions omits the
      // checks, so recomputing here would quietly erase a failed run's flag).
      const attention = state.topup ? (state.base.attention || scored.attention) : scored.attention;
      try {
        localStorage.setItem("dc_last_result", JSON.stringify({
          vector: scored.vector, counts: scored.counts, bands: scored.bands,
          consistency: scored.consistency, attention, precision: scored.precision,
          answers, testMode: state.testMode, answerMode: state.answerMode,
          bankVersion: data.bankVersion || 1, approximatedAxes: data.approximatedAxes || [], enc,
          // Fingerprint what was answered so a future bank edit can be topped up
          // precisely, rather than falling back to the one-off id rule in scoring.js.
          bankSig: currentSig, itemFp: itemFingerprints(served),
        }));
      } catch {}
      location.href = `results.html#r=${enc}`;
    }

    document.getElementById("back-btn").addEventListener("click", back);
    document.getElementById("restart-btn").addEventListener("click", () => {
      // In a top-up, "restart" would mean discarding the earlier run and taking the
      // whole test again — the one thing the flow exists to avoid. It's hidden there.
      if (state.topup) return;
      if (Object.keys(state.answers).length && !confirm("Discard your answers and restart?")) return;
      clearProgress(); startFresh(testMode(), answerMode()); render();
    });
    window.addEventListener("keydown", (e) => {
      if (e.target.matches("input[type=number], textarea, select")) return;
      if (state && state.pos >= state.order.length) {   // completion screen
        if (e.key === "Enter") { e.preventDefault(); finish(); }
        else if (e.key === "Backspace") { e.preventDefault(); back(); }
        return;
      }
      if (state && state.answerMode === "classic" && !e.target.matches("input")) {
        const o = CLASSIC_ANSWERS.find((x) => x.key === e.key);
        if (o) { e.preventDefault(); if (state.pos < state.order.length) record(o.v); return; }
      }
      if (state && state.answerMode === "precision" && e.key === "Enter" && engaged) {
        const s = document.getElementById("slider"); if (s) { e.preventDefault(); record(Number(s.value)); return; }
      }
      if (e.key === "Backspace" && !e.target.matches("input")) { e.preventDefault(); back(); }
    });

    // expose bank version to finish() without re-fetching
    loadQuestionData().then((d) => { window.__dc_data = d; }).catch(() => {});
    boot();
  </script>
</body>
</html>
