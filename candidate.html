<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Candidate — Politeion</title>
  <link rel="canonical" href="https://politeion.com/candidate.html">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div data-shell></div>
  <main class="wrap">
    <div id="view"><p class="muted">Loading candidate…</p></div>
    <p class="btn-row" style="margin-top:1.2rem"><a class="btn" href="candidates.html">← All candidates</a></p>
  </main>

  <script type="module">
    import { initShell } from "./js/app.js";
    import { hashParams } from "./js/analyzer-ui.js";
    import { renderCandidateFull } from "./js/candidates-ui.js";
    initShell("candidates.html");

    const view = document.getElementById("view");
    async function load() {
      const id = hashParams().id;
      if (!id) { view.innerHTML = '<div class="notice notice-warn">No candidate id in the link.</div>'; return; }
      try {
        const r = await fetch("/api/candidate?id=" + encodeURIComponent(id), { cache: "no-cache" });
        if (r.status === 404) { view.innerHTML = '<div class="notice notice-warn">No such candidate.</div>'; return; }
        const d = await r.json();
        renderCandidateFull(view, d.candidate, d.profile);
        document.title = (d.candidate.name || "Candidate") + " — Politeion";
      } catch (e) { view.innerHTML = '<div class="notice notice-warn">Could not load candidate: ' + e.message + '</div>'; }
    }
    window.addEventListener("hashchange", load);
    load();
  </script>
</body>
</html>
